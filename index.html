<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KOALA.build</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Ubuntu,sans-serif;
background:#0b0f14;
color:#e6edf3;
min-height:100vh;
display:flex;
flex-direction:column;
}

/* smooth animated background */

body::before{
content:"";
position:fixed;
top:-50%;
left:-50%;
width:200vw;
height:200vh;

background:
radial-gradient(circle at 25% 35%, #1f6feb33, transparent 40%),
radial-gradient(circle at 75% 65%, #2ea04333, transparent 40%);

animation:move 18s ease-in-out infinite alternate;

z-index:-1;
pointer-events:none;
filter:blur(20px);
}

@keyframes move{
from{transform:translate(-4%,-4%)}
to{transform:translate(4%,4%)}
}

/* main layout */

.main{
flex:1;
display:flex;
align-items:center;
justify-content:center;
padding:40px;
}

.container{
text-align:center;
max-width:800px;
}

/* logo */

.logo{
font-size:72px;
font-weight:700;
letter-spacing:10px;
margin-bottom:10px;
}

.tagline{
color:#8b949e;
font-size:18px;
margin-bottom:40px;
}

/* terminal */

.terminal{
background:#010409;
border:1px solid #30363d;
border-radius:8px;
padding:20px;
text-align:left;
font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
font-size:14px;
line-height:1.6;
max-width:600px;
margin:auto;
box-shadow:0 0 30px rgba(31,111,235,0.15);
min-height:160px;
}

.line{
opacity:0;
white-space:pre;
animation:appear 0.4s forwards;
}

@keyframes appear{
to{opacity:1}
}

/* blinking cursor */

.cursor{
display:inline-block;
width:8px;
background:#e6edf3;
margin-left:4px;
animation:blink 1s steps(1) infinite;
}

@keyframes blink{
50%{opacity:0;}
}

/* footer */

footer{
text-align:center;
padding:20px;
color:#6e7681;
font-size:13px;
}

footer a{
color:#58a6ff;
text-decoration:none;
margin-left:10px;
}

footer a:hover{
text-decoration:underline;
}

</style>
</head>

<body>

<div class="main">

<div class="container">

<div class="logo">KOALA</div>

<div class="tagline">
Something interesting is cooking.
</div>

<div class="terminal" id="terminal"></div>

</div>

</div>

<footer>
koala.build • <a href="https://github.com/koala-build">GitHub</a>
</footer>

<script>

const lines = [

"> booting system...",
"> loading modules...",
"> initializing runtime...",
"> establishing connections...",
"> preparing environment...",
"> system ready.",
"",
"        ʕ •ᴥ•ʔ",
"        KOALA",
"",
"> koala.build",
"> status: early stage",
"> details: coming later"

]

const terminal = document.getElementById("terminal")

lines.forEach((text, i) => {
setTimeout(() => {
const div = document.createElement("div")
div.className = "line"
div.textContent = text
terminal.appendChild(div)
}, i * 600)
})

/* add blinking cursor at the end */

setTimeout(() => {
const cursor = document.createElement("span")
cursor.className = "cursor"
terminal.appendChild(cursor)
}, lines.length * 600)

</script>

</body>
</html>
