<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KOALA.build</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Ubuntu,sans-serif;
background:#0b0f14;
color:#e6edf3;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

/* subtle animated gradient */

body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:radial-gradient(circle at 30% 30%, #1f6feb22, transparent 40%),
           radial-gradient(circle at 70% 70%, #2ea04322, transparent 40%);
animation:float 12s ease-in-out infinite alternate;
z-index:-1;
}

@keyframes float{
from{transform:translate(-5%, -5%)}
to{transform:translate(5%, 5%)}
}

.container{
text-align:center;
padding:40px;
max-width:700px;
}

.logo{
font-size:64px;
font-weight:700;
letter-spacing:6px;
margin-bottom:10px;
}

.tagline{
color:#8b949e;
font-size:18px;
margin-bottom:30px;
}

.line{
width:60px;
height:2px;
background:#30363d;
margin:30px auto;
}

.status{
font-size:15px;
color:#8b949e;
}

.links{
margin-top:30px;
}

.links a{
color:#58a6ff;
text-decoration:none;
margin:0 12px;
font-size:14px;
}

.links a:hover{
text-decoration:underline;
}

footer{
position:absolute;
bottom:20px;
font-size:13px;
color:#6e7681;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
KOALA
</div>

<div class="tagline">
Something interesting is cooking.
</div>

<div class="line"></div>

<div class="status">
Early stage project.<br>
More details later.
</div>

<div class="links">
<a href="https://github.com/koala-build">GitHub</a>
</div>

</div>

<footer>
koala.build
</footer>

</body>
</html>
